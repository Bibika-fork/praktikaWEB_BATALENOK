<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку | Color & Blond</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        
        .thanks-container {
            max-width: 600px;
            margin: 20px;
            background: #FEEDED;
            border-radius: 50px;
            padding: 60px 50px;
            text-align: center;
        }
        
        .thanks-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        
        .thanks-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 20px;
        }
        
        .thanks-text {
            font-size: 18px;
            line-height: 1.6;
            color: #5A5A5A;
            margin-bottom: 20px;
        }
        
        .thanks-subtext {
            font-size: 16px;
            line-height: 1.5;
            color: #8F7668;
            margin-bottom: 40px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #9F6060 0%, #C47A7A 100%);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(159, 96, 96, 0.3);
        }
        
        @media (max-width: 600px) {
            .thanks-container {
                padding: 40px 30px;
                border-radius: 30px;
            }
            .thanks-title {
                font-size: 32px;
            }
            .thanks-text {
                font-size: 16px;
            }
            .thanks-subtext {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-icon">✓</div>
        <h1 class="thanks-title">Спасибо за заявку!</h1>
        <p class="thanks-text">
            Мы получили ваше сообщение и свяжемся с вами<br>
            в ближайшее время.
        </p>
        <p class="thanks-subtext">
            Наш специалист ответит на все ваши вопросы.
        </p>
        <a href="index.html" class="back-btn">Вернуться на главную</a>
    </div>
</body>
</html>
